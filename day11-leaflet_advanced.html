<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Leaflet 进阶</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初始化地图（广佛深中心）
        var map = L.map('map').setView([22.9, 113.5], 9);
        
        // 底图1：高德街道图
        var gaode = L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
            subdomains: ['1', '2', '3', '4'],
            attribution: '高德地图'
        }).addTo(map);
        
        // 底图2：高德卫星图（备用）
        var gaodeSat = L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}', {
            subdomains: ['1', '2', '3', '4'],
            attribution: '高德卫星'
        });
        
        // 添加多个标记
        var cities = [
            { name: "佛山", lat: 23.0288, lng: 113.1226 },
            { name: "广州", lat: 23.1291, lng: 113.2644 },
            { name: "深圳", lat: 22.5431, lng: 114.0579 },
            { name: "东莞", lat: 23.0489, lng: 113.7448 }
        ];
        
        for (let i = 0; i < cities.length; i++) {
            let c = cities[i];
            L.marker([c.lat, c.lng])
                .addTo(map)
                .bindPopup(`<b>${c.name}</b><br>纬度: ${c.lat}<br>经度: ${c.lng}`);
        }
        
        // 画线：连接佛山-广州-深圳
        var line = L.polyline([
            [23.0288, 113.1226],  // 佛山
            [23.1291, 113.2644],  // 广州
            [22.5431, 114.0579]   // 深圳
        ], { color: 'red', weight: 3 }).addTo(map);
        
        // 画圆：佛山50公里范围
        var circle = L.circle([23.0288, 113.1226], {
            color: 'blue',
            fillColor: '#30f',
            fillOpacity: 0.2,
            radius: 50000  // 50公里，单位米
        }).addTo(map).bindPopup("佛山50公里范围");
        
        // 底图切换控件
        var baseMaps = {
            "街道图": gaode,
            "卫星图": gaodeSat
        };
        L.control.layers(baseMaps).addTo(map);
        
        // 添加比例尺
        L.control.scale().addTo(map);
        
        console.log("地图加载完成，标记数量：" + cities.length);
    </script>
</body>
</html>
