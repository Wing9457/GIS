<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的第一张地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([23.0288, 113.1226], 13);
        
        // 高德底图（国内可用）
        L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
            subdomains: ['1', '2', '3', '4'],
            attribution: '高德地图'
        }).addTo(map);
        
        L.marker([23.0288, 113.1226]).addTo(map).bindPopup("佛山").openPopup();
// 广州标记
L.marker([23.1291, 113.2644])
    .addTo(map)
    .bindPopup("广州");

// 深圳标记  
L.marker([22.5431, 114.0579])
    .addTo(map)
    .bindPopup("深圳");
    </script>
</body>
</html>
