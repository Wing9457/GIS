<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>day21 GIS全栈最终版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        body { margin:0; padding:0; }
        #map { height:100vh; width:100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([23.0288, 113.1226], 14);
    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        subdomains: ['1','2','3','4'],
        attribution: '高德地图'
    }).addTo(map);

    let markerLayer = L.layerGroup().addTo(map);

    // 加载所有点位
    async function loadMarkers() {
        markerLayer.clearLayers();
        const res = await fetch('http://localhost:3000/api/markers');
        const data = await res.json();
        data.data.forEach(item => {
            const marker = L.marker([item.lat, item.lng]).addTo(markerLayer);
            marker.bindPopup(`
                <b>${item.name}</b><br>
                ID: ${item.id}<br>
                <button onclick="editMarker(${item.id})">修改</button>
                <button onclick="deleteMarker(${item.id})">删除</button>
            `);
        });
    }

    // 添加
    map.on('click', async (e) => {
        const name = prompt('输入名称：');
        if (!name) return;
        await fetch('http://localhost:3000/api/markers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, lat: e.latlng.lat, lng: e.latlng.lng })
        });
        loadMarkers();
    });

    // 修改
    async function editMarker(id) {
        const newName = prompt('输入新名称：');
        if (!newName) return;
        await fetch(`http://localhost:3000/api/markers/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newName })
        });
        loadMarkers();
    }

    // 删除
    async function deleteMarker(id) {
        if (!confirm('确定删除？')) return;
        await fetch(`http://localhost:3000/api/markers/${id}`, { method: 'DELETE' });
        loadMarkers();
    }

    loadMarkers();
</script>
</body>
</html>
