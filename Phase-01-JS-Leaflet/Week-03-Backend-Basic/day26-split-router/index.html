<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>day26 路由拆分</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([23.0288, 113.1226], 13);
        L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
            subdomains: ['1','2','3','4'], attribution: '高德地图'
        }).addTo(map);

        const markerGroup = L.layerGroup().addTo(map);

        async function loadMarkers() {
            markerGroup.clearLayers();
            const res = await fetch('http://localhost:3000/api/markers');
            const json = await res.json();
            json.data.forEach(item => {
                L.marker([item.lat, item.lng])
                .addTo(markerGroup)
                .bindPopup(`
                    <strong>${item.name}</strong><br>
                    <button onclick="editPoint(${item.id})">编辑</button>
                    <button onclick="delPoint(${item.id})">删除</button>
                `);
            });
        }

        map.on('click', async e => {
            const name = prompt('请输入点位名称：');
            if (!name) return;
            await fetch('http://localhost:3000/api/markers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, lat: e.latlng.lat, lng: e.latlng.lng })
            });
            loadMarkers();
        });

        async function editPoint(id) {
            const newName = prompt('输入新名称：');
            if (!newName) return;
            await fetch(`http://localhost:3000/api/markers/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: newName })
            });
            loadMarkers();
        }

        async function delPoint(id) {
            if (!confirm('确定删除？')) return;
            await fetch(`http://localhost:3000/api/markers/${id}`, { method: 'DELETE' });
            loadMarkers();
        }

        loadMarkers();
    </script>
</body>
</html>
