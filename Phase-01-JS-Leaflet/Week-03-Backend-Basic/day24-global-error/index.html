<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>day24 全局异常处理</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        *{margin:0;padding:0}
        #map{width:100vw;height:100vh}
    </style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([23.0288,113.1226],14)
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{
  subdomains:['1','2','3','4'],attribution:'高德地图'
}).addTo(map)

const g = L.layerGroup().addTo(map)

async function load(){
  g.clearLayers()
  let r = await fetch('http://localhost:3000/api/markers')
  let j = await r.json()
  j.data.forEach(i=>{
    L.marker([i.lat,i.lng]).addTo(g).bindPopup(`
      ${i.name}<br>
      <button onclick=edit(${i.id})>改</button>
      <button onclick=del(${i.id})>删</button>
    `)
  })
}

map.on('click',async e=>{
  let name = prompt('名称：')
  if(!name)return
  await fetch('http://localhost:3000/api/markers',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,lat:e.latlng.lat,lng:e.latlng.lng})
  })
  load()
})

async function edit(id){
  let n = prompt('新名称：')
  if(!n)return
  await fetch(`http://localhost:3000/api/markers/${id}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:n})
  })
  load()
}

async function del(id){
  if(!confirm('确定删除？'))return
  await fetch(`http://localhost:3000/api/markers/${id}`,{method:'DELETE'})
  load()
}

load()
</script>
</body>
</html>
