<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>day22 数据优化 & 连接池</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        *{margin: 0;padding: 0;}
        #map{width: 100vw;height: 100vh;}
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初始化地图
        const map = L.map('map').setView([23.0288, 113.1226],13);
        L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{
            subdomains:['1','2','3','4'],
            attribution:"高德地图"
        }).addTo(map);

        const markerGroup = L.layerGroup().addTo(map);

        // 加载点位
        async function getMarkers(){
            markerGroup.clearLayers();
            let res = await fetch("http://localhost:3000/api/markers");
            let json = await res.json();
            json.data.forEach(item=>{
                let marker = L.marker([item.lat,item.lng]).addTo(markerGroup);
                marker.bindPopup(`
                    <h4>${item.name}</h4>
                    <p>ID：${item.id}</p>
                    <button onclick="editPoint(${item.id})">编辑</button>
                    <button onclick="delPoint(${item.id})">删除</button>
                `)
            })
        }

        // 点击添加点位
        map.on("click",async e=>{
            let name = prompt("请输入点位名称：");
            if(!name) return;
            await fetch("http://localhost:3000/api/markers",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({
                    name:name,
                    lat:e.latlng.lat,
                    lng:e.latlng.lng
                })
            })
            getMarkers();
        })

        // 编辑
        async function editPoint(id){
            let newName = prompt("输入新名称：");
            if(!newName) return;
            await fetch(`http://localhost:3000/api/markers/${id}`,{
                method:"PUT",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({name:newName})
            })
            getMarkers();
        }

        // 删除
        async function delPoint(id){
            if(!confirm("确定删除该点位？")) return;
            await fetch(`http://localhost:3000/api/markers/${id}`,{
                method:"DELETE"
            })
            getMarkers();
        }

        // 页面初始化加载
        getMarkers();
    </script>
</body>
</html>
