<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>加载本地 GeoJSON</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([23.0288, 113.1226], 9);
        
        L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
            subdomains: ['1', '2', '3', '4'],
            attribution: '高德地图'
        }).addTo(map);
        
        // ===== 加载本地 GeoJSON 文件 =====
        async function loadLocalData() {
            try {
                // 本地文件路径（相对路径）
                let response = await fetch('./data/cities.json');
                
                if (!response.ok) {
                    throw new Error('文件加载失败: ' + response.status);
                }
                
                let geojsonData = await response.json();
                
                // 根据 type 属性设置不同颜色
                var typeColors = {
                    "制造业": "#ff7800",
                    "商贸": "#0066cc",
                    "科技": "#00cc66"
                };
                
                L.geoJSON(geojsonData, {
                    pointToLayer: function(feature, latlng) {
                        var color = typeColors[feature.properties.type] || "#999";
                        return L.circleMarker(latlng, {
                            radius: 12,
                            fillColor: color,
                            color: "#000",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        });
                    },
                    onEachFeature: function(feature, layer) {
                        layer.bindPopup(`
                            <b>${feature.properties.name}</b><br>
                            类型: ${feature.properties.type}
                        `);
                    }
                }).addTo(map);
                
                console.log('加载了', geojsonData.features.length, '个城市');
                
            } catch (error) {
                console.error('错误:', error);
                alert('加载本地文件失败，请使用 Live Server 运行');
            }
        }
        
        loadLocalData();
    </script>
</body>
</html>
