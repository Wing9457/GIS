<!DOCTYPE html>
<html>
<head>
    <title>我的第一张地图</title>
    <!-- 引入 Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <!-- 引入 Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初始化地图
        var map = L.map('map').setView([23.0288, 113.1226], 13);
        
        // 添加底图（OpenStreetMap）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        
        // 添加标记（佛山位置）
        L.marker([23.0288, 113.1226]).addTo(map)
            .bindPopup("我在这里！")
            .openPopup();
    </script>
</body>
</html>
